services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mysite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-mysite}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mysite}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: always
    ports:
      - "${APP_PORT:-3001}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mysite}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-mysite}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
